name: Daily Journal Entry

on:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC
  workflow_dispatch: {}

jobs:
  create-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create dated entry
        run: |
          set -e
          DATE=$(date -u +%F)
          DIR=entries
          FILE="$DIR/$DATE.md"
          mkdir -p "$DIR"
          if [ -f "$FILE" ]; then
            echo "Entry for $DATE already exists."
            exit 0
          fi

          cat > "$FILE" <<EOF
# Daily Learning - $DATE

Date: $DATE

Summary:

What I learned today:

- 

Code samples:

```js
// Add code here
```

Images:

- Add images to `entries/images/$DATE/` and reference here: ![example](images/$DATE/example.png)

EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: add daily journal entry $DATE" || echo "No changes to commit"
          git push
