<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Display</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="demo-shell">
        <main class="traffic-light" aria-label="Traffic light display">
            <div class="light red"></div>
            <div class="light yellow"></div>
            <div class="light green"></div>
        </main>

        <section class="photo-output" aria-label="Photo output preview">
            <img src="images/traffic-photo.svg" alt="Decorative photo output illustration">
            <p>Photo output</p>
        </section>
    </section>
</body>

</html>
